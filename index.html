<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silsilah Keluarga Bani Hasan</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <div class="app-header">
        <h1>Silsilah Bani Hasan</h1>
        <div class="header-controls">
            <select id="cluster-select" class="btn-control" style="background-color: white; cursor: pointer;">
                <option value="all">Semua Klan (Bani Hasan)</option>
                <option value="2">Nyamplungan</option>
                <option value="3">Jepara</option>
                <option value="4">Krembangan</option>
                <option value="5">Karang Tembok</option>
                <option value="6">Ngesong</option>
                <option value="7">Bulak Banteng</option>
                <option value="8">Kampung Baru</option>
            </select>
            <button id="btn-collapse-all" class="btn-control">Sembunyikan Semua</button>
            <button id="btn-expand-all" class="btn-control">Tampilkan Semua</button>
        </div>
    </div>
    <div id="tree-container"></div>
    <script src="script.js"></script>
</body>
</html>
